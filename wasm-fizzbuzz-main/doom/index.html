<!doctype html>

<html lang= ko>

  <head>
    <meta charset="utf-8">
    <title>DooM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/coi-serviceworker/0.1.7/coi-serviceworker.min.js"></script>
    <style>
      /* 1. 웹사이트 전체 화면 정중앙 배치 */
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f0f2; 
        display: flex;
        justify-content: center;   /* 가로 정중앙 */
        align-items: center;       /* 세로 정중앙 */
        min-height: 100vh;         /* 브라우저 높이 전체를 기준으로 계산 */
      }

      /* 2. 메인 컨테이너 박스 (화면의 기준점) */
      .container {
        position: relative;
        width: 70vw;               /* 화면 가로폭의 70% (취향껏 75vw 등으로 조절 가능) */
        max-width: 1200px;         
        aspect-ratio: 16 / 10;     /* 둠 황금 비율 유지 */
        
        border: 2px solid #ccc;    
        background-color: #ffffff; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        
        container-type: inline-size; 
        overflow: hidden;          /* 자식 요소가 삐져나가지 않게 차단 */
      }

      /* 3. 위에 덮여서 입력을 독점하는 투명 캔버스 */
      #screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;               /* 액자 크기에 100% 맞춤 */
        height: 100%;
        z-index: 2;
        opacity: 0;                /* 눈에 안 보이게 숨김 */
        cursor: pointer;
      }

      /* 4. 밑에 깔려서 회색 상자에 칼같이 들어맞는 아스키 화면 */
      #output {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;               /* 액자 크기에 100% 맞춤 */
        height: 100%;
        z-index: 1;
        margin: 0;                 
        padding: 0;                
        
        color: #000000;               
        font-family: 'Courier New', Courier, monospace; 
        font-weight: bold;
        white-space: pre;             
        overflow: hidden;          

        /* 지난번에 성공하신 완벽한 미세조정 비율 수치 */
        font-size: 0.294cqw;        
        line-height: 0.158cqw;      
        letter-spacing: -0.02cqw;
      }

      /* 로그 메시지 스타일 정의 (기본값 유지) */
      #output span.log { color:darkslateblue; }
      #output span.stdout { color: black; }
      #output span.stderr { font-weight: bold; color:brown; }
      
      
.noto-sans-kr-<uniquifier> {
  font-family: "Noto Sans KR", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
    </style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
  </head>

  <body>

   <div id="guideModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100;">
  <div style="background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 500px; text-align: center;">
    <h2 style="'Noto Sans KR', sans-serif; font-weight: 800; margin: 10px auto;">DooM 게임방법</h2>
    <p style="'Noto Sans KR', sans-serif; font-weight: 100; font-size: 12px; line-height: 18px; margin-bottom: 20px;">게임 설정 확인 : Enter<br>움직이기 : 방향키<br> 사격 : control<br>문열기 : 스페이스바</p>
    <button onclick="closeModal()" style="'Noto Sans KR', sans-serif; padding: 10px 20px; cursor: pointer; border-radius: 8px; border: 1px solid #999999;">창 닫기</button>
  </div>
</div>

<div style="position: fixed; bottom: 20px; z-index: 50;">
  <button onclick="openModal()" style="padding: 10px 20px; cursor: pointer; background: #444444; color: white; border: none; border-radius: 8px;">도움말</button>
</div>
   
    <div class="container">
      <canvas id="screen" width="640" height="400" tabindex="0">This is where the DooM screen should render.</canvas>
      <div id="output"></div>
    </div>

    <div style="display: none;">
      <p id="focushint"></p>
      <button id="enterButton"></button>
      <button id="leftButton"></button>
      <button id="upButton"></button>
      <button id="downButton"></button>
      <button id="rightButton"></button>
      <button id="ctrlButton"></button>
      <button id="spaceButton"></button>
      <button id="altButton"></button>
      <span id="getmsps_stats">0</span><span id="getms_stats">0</span>
      <span id="fps_stats">0</span><span id="drawframes_stats">0</span>
      <span id="animationfps_stats">0</span>
    </div>

    <script src="main.js" defer></script>
  </body>

</html>
